name: Update RSS feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cached data
        uses: actions/cache@v4
        with:
          path: data
          key: models-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Random delay (0-5 minutes)
        run: |
          python - <<'PY'
          import random, time
          delay = random.randint(0, 300)
          print(f"Sleeping {delay}s before refresh")
          time.sleep(delay)
          PY

      - name: Run tracker
        run: poetry run models-track

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feed.xml data/models.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update feed [skip ci]"
          git push

      - name: Upload feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feed-data
          path: data/
